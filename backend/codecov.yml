# Codecov configuration
# Reference: https://docs.codecov.com/docs/codecov-yaml
# Validate after edits with: curl -X POST --data-binary @codecov.yml https://codecov.io/validate

codecov:
  require_ci_to_pass: true
  notify:
    wait_for_ci: true

coverage:
  precision: 1
  round: down
  range: "70...100"

  status:
    project:
      default:
        target: auto
        threshold: 1%
        informational: false
        only_pulls: false
    patch:
      default:
        target: 80%
        threshold: 5%
        informational: false

parsers:
  cobertura:
    partials_as_hits: true

comment:
  layout: "header, diff, flags, components, files, footer"
  behavior: default
  require_changes: false
  require_base: false
  require_head: true

flags:
  rest:
    paths:
      - PaperlessREST/
    carryforward: false
  services:
    paths:
      - PaperlessServices/
    carryforward: false

component_management:
  individual_components:
    - component_id: rest_api
      name: REST API
      paths:
        - PaperlessREST/**
    - component_id: services_worker
      name: Worker Services
      paths:
        - PaperlessServices/**

ignore:
  - "Pipeline/**"                       # NUKE build code
  - "**/Program.cs"                     # host entry points
  - "**/Migrations/**"                  # EF Core auto-generated
  - "**/*.Designer.cs"                  # designer-generated
  - "**/GlobalUsings.cs"                # using directives only
  - "**/obj/**"
  - "**/bin/**"
  - "PaperlessREST.Tests/**"            # test code
  - "PaperlessServices.Tests/**"
