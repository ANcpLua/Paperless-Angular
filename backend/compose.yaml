name: paperless
services:
    # ════════════════════════════════════════════════════════════════════════
    # OBSERVABILITY
    # ════════════════════════════════════════════════════════════════════════
    # LOCAL DEV ONLY: Aspire dashboard is exposed on :18888 with auth=Unsecured
    # so the developer can open it without configuring OIDC. Do NOT deploy this
    # compose file to a host reachable from outside localhost — move the
    # dashboard service to a compose.override.yaml or add an auth mode before
    # binding to anything other than 127.0.0.1.
    aspire-dashboard:
        container_name: paperless-dashboard
        image: mcr.microsoft.com/dotnet/aspire-dashboard:latest@sha256:cb04a30c7b815476474184564635f60c206d78855261731d8d99a6549bbf483a
        ports:
            - "18888:18888"   # Dashboard UI
            - "4317:18889"    # OTLP gRPC endpoint
        environment:
            DASHBOARD__OTLP__AUTHMODE: Unsecured
            DASHBOARD__FRONTEND__AUTHMODE: Unsecured
            TZ: ${TZ}

    # ════════════════════════════════════════════════════════════════════════
    # INFRASTRUCTURE
    # ════════════════════════════════════════════════════════════════════════
    postgres:
        container_name: paperless-postgres
        image: ${POSTGRES_IMAGE}
        ports:
            - "${POSTGRES_PORT}:5432"
        environment:
            POSTGRES_DB: ${POSTGRES_DB}
            POSTGRES_USER: ${POSTGRES_USER}
            POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
            TZ: ${TZ}
        healthcheck:
            test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}" ]
            interval: 5s
            timeout: 3s
            retries: 20
        volumes:
            - postgres_data:/var/lib/postgresql/data

    rabbitmq:
        container_name: paperless-rabbitmq
        image: ${RABBITMQ_IMAGE}
        ports:
            - "${RABBITMQ_PORT}:5672"
            - "${RABBITMQ_MANAGEMENT_PORT}:15672"
        environment:
            RABBITMQ_DEFAULT_USER: ${RABBITMQ_USERNAME}
            RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}
            TZ: ${TZ}
        healthcheck:
            test: [ "CMD", "rabbitmq-diagnostics", "-q", "ping" ]
            interval: 5s
            timeout: 3s
            retries: 20
        volumes:
            - rabbitmq_data:/var/lib/rabbitmq

    minio:
        container_name: paperless-minio
        image: ${MINIO_IMAGE}
        command: server /data --console-address :9001
        ports:
            - "${MINIO_PORT}:9000"
            - "${MINIO_CONSOLE_PORT}:9001"
        environment:
            MINIO_ROOT_USER: ${MINIO_ROOT_USER}
            MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
            TZ: ${TZ}
        healthcheck:
            test: [ "CMD-SHELL", "curl -f http://localhost:9000/minio/health/live || exit 1" ]
            interval: 5s
            timeout: 3s
            retries: 30
        volumes:
            - minio_data:/data

    elasticsearch:
        container_name: paperless-elasticsearch
        image: ${ELASTIC_IMAGE}
        ports:
            - "${ELASTICSEARCH_PORT}:9200"
            - "${ELASTICSEARCH_TRANSPORT_PORT}:9300"
        environment:
            discovery.type: ${ELASTICSEARCH_DISCOVERY_TYPE}
            xpack.security.enabled: "${ELASTICSEARCH_XPACK_SECURITY}"
            ES_JAVA_OPTS: ${ES_JAVA_OPTS}
            TZ: ${TZ}
        healthcheck:
            test: [ "CMD-SHELL", "curl -fsSL http://localhost:9200 >/dev/null || exit 1" ]
            interval: 5s
            timeout: 3s
            retries: 30
        volumes:
            - elasticsearch_data:/usr/share/elasticsearch/data

    nginx:
        container_name: paperless-nginx
        image: ${NGINX_IMAGE}
        ports:
            - "80:80"
        volumes:
            - ./docker/nginx.conf:/etc/nginx/nginx.conf:ro
        depends_on:
            paperless-rest: { condition: service_started }
            paperless-blazor: { condition: service_started }
        environment:
            TZ: ${TZ}
        healthcheck:
            test: [ "CMD", "nginx", "-t" ]
            interval: 5s
            timeout: 3s
            retries: 10

    # ════════════════════════════════════════════════════════════════════════
    # APPLICATION SERVICES
    # ════════════════════════════════════════════════════════════════════════
    paperless-rest:
        container_name: paperless-rest
        image: ${PAPERLESS_REST_IMAGE}
        build:
            context: .
            dockerfile: PaperlessREST/Dockerfile
        ports:
            - "${PAPERLESS_REST_PORT}:8080"
        depends_on:
            postgres: { condition: service_healthy }
            rabbitmq: { condition: service_healthy }
            minio: { condition: service_healthy }
            elasticsearch: { condition: service_healthy }
            aspire-dashboard: { condition: service_started }
        env_file:
            - .env
        environment:
            ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Development}
            ASPNETCORE_URLS: ${ASPNETCORE_URLS}
            ConnectionStrings__PaperlessDb: Host=postgres;Port=5432;Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD};Include Error Detail=true
            ConnectionStrings__Hangfire: Host=postgres;Port=5432;Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD};Include Error Detail=true
            Batch__InputPath: ${BATCH__INPUTPATH}
            Batch__ArchivePath: ${BATCH__ARCHIVEPATH}
            Batch__ErrorPath: ${BATCH__ERRORPATH}
            Batch__FilePattern: ${BATCH__FILEPATTERN}
            Batch__TimeZoneId: ${BATCH__TIMEZONEID}
            Batch__CronExpression: ${BATCH__CRONEXPRESSION}
            # OpenTelemetry
            OTEL_EXPORTER_OTLP_ENDPOINT: http://aspire-dashboard:18889
            OTEL_SERVICE_NAME: paperless-rest
            TZ: ${TZ}
        volumes:
            - ./PaperlessREST/sample-data/input:${BATCH__INPUTPATH}
            - ./PaperlessREST/sample-data/archive:${BATCH__ARCHIVEPATH}
            - ./PaperlessREST/sample-data/error:${BATCH__ERRORPATH}

    paperless-blazor:
        container_name: paperless-blazor
        image: ${PAPERLESS_BLAZOR_IMAGE:-paperless-blazor:latest}
        build:
            context: .
            dockerfile: PaperlessUI.Blazor/Dockerfile
        depends_on:
            paperless-rest: { condition: service_started }
            aspire-dashboard: { condition: service_started }
        environment:
            ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Development}
            ASPNETCORE_URLS: http://+:8080
            Paperless__ApiBaseUrl: http://paperless-rest:8080
            # OTel env mirrors the sibling services for consistency (no OTel SDK is
            # wired in any app yet, so these are currently inert — kept aligned).
            OTEL_EXPORTER_OTLP_ENDPOINT: http://aspire-dashboard:18889
            OTEL_SERVICE_NAME: paperless-blazor
            TZ: ${TZ}

    paperless-services:
        container_name: paperless-services
        image: ${PAPERLESS_SERVICES_IMAGE}
        build:
            context: .
            dockerfile: PaperlessServices/Dockerfile
        depends_on:
            rabbitmq: { condition: service_healthy }
            minio: { condition: service_healthy }
            elasticsearch: { condition: service_healthy }
            aspire-dashboard: { condition: service_started }
        env_file:
            - .env
        environment:
            ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Development}
            # OpenTelemetry
            OTEL_EXPORTER_OTLP_ENDPOINT: http://aspire-dashboard:18889
            OTEL_SERVICE_NAME: paperless-services
            TZ: ${TZ}

volumes:
    postgres_data:
    rabbitmq_data:
    minio_data:
    elasticsearch_data:
